name: Generar APK Geovengo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Actualizado para cumplir con los requisitos de Capacitor
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Generar íconos para Android
        run: |
          npm install @capacitor/assets
          npx capacitor-assets generate --android --icon assets/icon.png

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Construir APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Geovengo-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
